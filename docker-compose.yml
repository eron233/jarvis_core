services:
  jarvis_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis_app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${JARVIS_API_PORT:-8000}:${JARVIS_API_PORT:-8000}"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./reports:/app/reports
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.environ.get(\"JARVIS_API_PORT\", \"8000\")}/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
